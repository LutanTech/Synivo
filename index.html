<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synivo | Collaborative Workspace</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f11;
            --bg-editor: #1e1e1e;
            --bg-sidebar: #151517;
            --border-color: #2d2d30;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #a1a1aa;
            --text-bright: #f4f4f5;
            --header-h: 48px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(9, 9, 11, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            padding: 20px;
        }

        .auth-card {
            background: #18181b;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .auth-header { text-align: center; margin-bottom: 24px; }
        .auth-header i {
            font-size: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .auth-input {
            width: 100%;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: white;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        header {
            height: var(--header-h);
            background: #18181b;
            display: flex;
            align-items: center;
            padding: 0 12px;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            z-index: 20;
        }

        .brand {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status-indicator {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #27272a;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        #main-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - var(--header-h));
            position: relative;
        }

        #workspace-container {
            flex: 1;
            min-width: 0;
            background: var(--bg-editor);
            display: flex;
            flex-direction: column;
        }

        #rich-text-editor {
            flex: 1;
            padding: 40px;
            outline: none;
            overflow-y: auto;
            display: none;
            font-size: 18px;
            line-height: 1.6;
            background: #ffffff;
            color: #18181b;
        }

        #rich-text-toolbar {
            display: none;
            padding: 8px;
            background: #f4f4f5;
            border-bottom: 1px solid #e4e4e7;
            gap: 4px;
        }

        .toolbar-btn {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #e4e4e7;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        #sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 30;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: #27272a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 90%;
        }

        .message.own { background: var(--accent-blue); color: white; align-self: flex-end; }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-ghost { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-toggle { background: #27272a; color: white; border: 1px solid var(--border-color); }
        .btn-toggle i { color: var(--accent-blue); }

        .lang-select {
            background: #27272a;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            padding: 4px 8px;
            outline: none;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: #18181b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 13px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 850px) {
            #sidebar {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                transform: translateX(100%);
                transition: transform 0.3s;
                width: 280px;
            }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-layer-group"></i>
                <h2>SYNIVO</h2>
            </div>
            <input type="text" id="auth-user" class="auth-input" placeholder="Username">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" id="loginBtn" onclick="attemptLogin()">
                <span class="spinner" id="authSpinner"></span>
                <span id="loginText">Login</span>
            </button>
            <p id="auth-error" style="color:var(--accent-red); font-size:12px; margin-top:12px; text-align:center; display:none;">Invalid Credentials</p>
        </div>
    </div>

    <div id="toast-container"></div>

    <header>
        <div class="brand">
            <i class="fas fa-layer-group"></i>
            <span class="hide-mobile">SYNIVO</span>
            <span id="status-indicator">Idle</span>
        </div>
        <div style="display:flex; gap:8px; align-items: center;">
            <select id="langSelect" class="lang-select" onchange="changeLanguage()">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
            </select>
            <button id="viewToggle" class="btn btn-toggle" onclick="requestToggleMode()">
                <i class="fas fa-code"></i> <span id="viewText">Code Editor</span>
            </button>
            <button id="actionBtn" class="btn btn-ghost">Edit</button>
            <button class="btn btn-ghost" onclick="logout()"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div id="main-container">
        <div id="workspace-container">
            <div id="rich-text-toolbar">
                <button class="toolbar-btn" onclick="execCmd('bold')"><b>B</b></button>
                <button class="toolbar-btn" onclick="execCmd('italic')"><i>I</i></button>
                <button class="toolbar-btn" onclick="execCmd('underline')"><u>U</u></button>
                <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
            </div>
            <div id="editor" style="flex:1"></div>
            <div id="rich-text-editor" contenteditable="false"></div>
        </div>

        <aside id="sidebar">
            <div id="messages"></div>
            <div style="padding:12px; border-top:1px solid var(--border-color)">
                <input id="msg" style="width:100%; background:#27272a; border:1px solid #3f3f46; color:white; padding:8px; border-radius:4px" placeholder="Chat..." onkeypress="if(event.key==='Enter') sendMsg()">
            </div>
        </aside>
    </div>

    <script>
        const API_URL = "https://synivo.onrender.com";
        let user, socket, editor, currentEditor, currentMode = "code", isLocalUpdate = false;
        const richEditor = document.getElementById('rich-text-editor');

        function showToast(msg, icon = 'info-circle') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setCookie(n, v) { document.cookie = n + "=" + v + "; path=/; max-age=604800"; }
        function getCookie(n) { return document.cookie.split('; ').find(r => r.startsWith(n+'='))?.split('=')[1]; }
        function eraseCookie(n) { document.cookie = n + "=; Max-Age=-1; path=/"; }

        async function attemptLogin() {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('authSpinner');
            const text = document.getElementById('loginText');
            btn.disabled = true;
            spinner.style.display = 'block';
            text.style.display = 'none';
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) { 
                    user = data.user; 
                    setCookie('syn_auth', data.token); 
                    initApp(); 
                } else {
                    document.getElementById('auth-error').style.display = 'block';
                }
            } catch (e) {
                showToast("Connection failed", "exclamation-triangle");
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                text.style.display = 'block';
            }
        }

        async function checkAutoLogin() {
            const t = getCookie('syn_auth');
            if (t) {
                const res = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: t })
                });
                const d = await res.json();
                if (d.success) { user = d.user; initApp(); return; }
            }
            document.getElementById('auth-overlay').style.display = 'flex';
        }

        function initApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            socket = io(API_URL);
            require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs" }});
            require(["vs/editor/editor.main"], () => {
                editor = monaco.editor.create(document.getElementById("editor"), {
                    value: "", language: "python", theme: "vs-dark", automaticLayout: true,
                    readOnly: true, fontSize: 14, minimap: { enabled: false }
                });
                editor.onDidChangeModelContent(() => {
                    if (!isLocalUpdate && currentEditor === user && currentMode === "code") 
                        socket.emit("text_update", { user, text: editor.getValue() });
                });
                richEditor.addEventListener('input', () => {
                    if (!isLocalUpdate && currentEditor === user && currentMode === "rich-text")
                        socket.emit("text_update", { user, text: richEditor.innerHTML });
                });
                setupSockets();
                showToast(`Welcome, ${user}`, 'user-check');
            });
        }

        function setupSockets() {
            socket.emit("join", { user });
            socket.on("update_text", t => {
                isLocalUpdate = true;
                if (currentMode === "code") {
                    if (editor.getValue() !== t) editor.setValue(t);
                } else {
                    if (richEditor.innerHTML !== t) richEditor.innerHTML = t;
                }
                isLocalUpdate = false;
            });
            socket.on("update_mode", m => {
                if(currentMode !== m) {
                    showToast(`Switched to ${m === 'code' ? 'Code' : 'Rich Text'} mode`, 'exchange-alt');
                }
                currentMode = m;
                applyModeUI();
            });
            socket.on("editor_status", c => {
                if (c && c !== currentEditor && c !== user) {
                    showToast(`${c} is now editing`, 'pen-nib');
                } else if (!c && currentEditor) {
                    showToast("Workspace is now open", 'unlock');
                }
                currentEditor = c;
                updateStatusUI();
            });
            socket.on("chat_message", d => {
                const m = document.getElementById("messages");
                const el = document.createElement("div");
                el.className = `message ${d.user === user ? 'own' : ''}`;
                el.innerHTML = `<b>${d.user}</b><br>${d.message}`;
                m.appendChild(el); m.scrollTop = m.scrollHeight;
            });
        }

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            if (editor) {
                monaco.editor.setModelLanguage(editor.getModel(), lang);
                showToast(`Language set to ${lang.toUpperCase()}`, 'code');
            }
        }

        function applyModeUI() {
            const isCode = currentMode === "code";
            document.getElementById('editor').style.display = isCode ? 'block' : 'none';
            document.getElementById('rich-text-editor').style.display = isCode ? 'none' : 'block';
            document.getElementById('rich-text-toolbar').style.display = isCode ? 'none' : 'flex';
            document.getElementById('langSelect').style.display = isCode ? 'block' : 'none';
            document.getElementById('viewText').innerText = isCode ? "Code Editor" : "Rich Text";
            document.getElementById('viewToggle').querySelector('i').className = isCode ? "fas fa-code" : "fas fa-align-left";
            updateStatusUI();
        }

        function updateStatusUI() {
            const i = document.getElementById("status-indicator");
            const b = document.getElementById("actionBtn");
            const l = document.getElementById("langSelect");
            const canEdit = currentEditor === user;
            if (currentMode === "code") {
                editor.updateOptions({ readOnly: !canEdit });
            } else {
                richEditor.contentEditable = canEdit;
            }
            l.disabled = !canEdit;
            if (canEdit) {
                i.innerText = "Editing"; i.style.background = "var(--accent-blue)";
                b.innerText = "Release"; b.onclick = () => socket.emit("stop_edit");
            } else if (currentEditor) {
                i.innerText = currentEditor; i.style.background = "#27272a";
                b.innerText = "Locked"; b.onclick = null;
            } else {
                i.innerText = "Open"; i.style.background = "#27272a";
                b.innerText = "Edit"; b.onclick = () => socket.emit("request_edit", { user });
            }
        }

        function requestToggleMode() {
            if (currentEditor === user) {
                const nextMode = currentMode === "code" ? "rich-text" : "code";
                socket.emit("mode_update", { user, mode: nextMode });
            } else {
                showToast("You must be editing to change mode", "lock");
            }
        }

        function execCmd(c) { document.execCommand(c, false, null); }
        function sendMsg() {
            const i = document.getElementById("msg");
            if (i.value.trim()) { socket.emit("chat_message", { user, message: i.value }); i.value = ""; }
        }
        function logout() { eraseCookie('syn_auth'); location.reload(); }
        window.onload = checkAutoLogin;
    </script>
</body>
</html>
